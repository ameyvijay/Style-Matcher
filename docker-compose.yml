version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://192.168.1.222:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./batch-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Allows backend inside Docker to hit Ollama running natively on macOS host
      - OLLAMA_HOST=http://host.docker.internal:11434 
    volumes:
      # Enables hot-reloading by syncing the host code to the container
      - ./batch-backend:/app
      # CRITICALLY IMPORTANT: Binding the host's absolute path identical to the container's path.
      # This enables the File Crawler to natively process absolute paths passed by the Web UI.
      - ${HOME}:${HOME}
